AWSTemplateFormatVersion: "2010-09-09"
Description: Muxer cluster (one-time) deployment with public ingress and dedicated HA/sync transport.

Parameters:
  ClusterName:
    Type: String
    Default: muxer-cluster-prod
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetAId:
    Type: AWS::EC2::Subnet::Id
  SubnetBId:
    Type: AWS::EC2::Subnet::Id
  HaSyncSubnetAId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet for muxer A HA/conntrack sync ENI.
  HaSyncSubnetBId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet for muxer B HA/conntrack sync ENI.
  NodeAPrivateIp:
    Type: String
    Default: ""
    Description: Optional static private IPv4 for muxer A primary ENI.
  NodeBPrivateIp:
    Type: String
    Default: ""
    Description: Optional static private IPv4 for muxer B primary ENI.
  NodeAHaSyncIp:
    Type: String
    Description: Static private IPv4 for muxer A HA/sync ENI.
  NodeBHaSyncIp:
    Type: String
    Description: Static private IPv4 for muxer B HA/sync ENI.
  AllowedIngressCidr:
    Type: String
    Default: 0.0.0.0/0
  AllowGreIngress:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  GreIngressCidr:
    Type: String
    Default: 172.31.0.0/16
    Description: Internal CIDR allowed to deliver GRE to the muxer primary ENIs.
  AmiId:
    Type: AWS::EC2::Image::Id
  InstanceType:
    Type: String
    Default: c8gn.8xlarge
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
  RootVolumeSizeGiB:
    Type: Number
    Default: 16
    MinValue: 8
  LoggingVolumeSizeGiB:
    Type: Number
    Default: 30
    MinValue: 8
  ApplicationVolumeSizeGiB:
    Type: Number
    Default: 80
    MinValue: 8
  LoggingMountPath:
    Type: String
    Default: /LOG
  ApplicationMountPath:
    Type: String
    Default: /Application
  ProjectPackageS3Uri:
    Type: String
    Default: ""
    Description: Optional s3://bucket/path/muxer-bundle.zip for muxer application code.
  HaProjectPackageS3Uri:
    Type: String
    Default: ""
    Description: Optional s3://bucket/path/muxingplus-ha.zip for HA controller code. Falls back to ProjectPackageS3Uri.
  MuxerInstallScript:
    Type: String
    Default: scripts/install-local.sh
    Description: Relative path inside muxer package archive.
  MuxerServiceName:
    Type: String
    Default: muxer
  EipAllocationId:
    Type: String
    Default: ""
    Description: Optional existing EIP allocation ID for single public identity.
  LeaseTableName:
    Type: String
    Default: ""
    Description: Optional DynamoDB table name for muxer role lease. Leave empty for auto-generated name.
  FlowSyncMode:
    Type: String
    Default: conntrackd
    AllowedValues:
      - none
      - conntrackd
  SaSyncMode:
    Type: String
    Default: none
    AllowedValues:
      - none
      - libreswan-no-sa-sync
      - strongswan-ha

Conditions:
  HasEip: !Not [!Equals [!Ref EipAllocationId, ""]]
  AllowGreIngressEnabled: !Equals [!Ref AllowGreIngress, "true"]
  HasNodeAPrivateIp: !Not [!Equals [!Ref NodeAPrivateIp, ""]]
  HasNodeBPrivateIp: !Not [!Equals [!Ref NodeBPrivateIp, ""]]
  HasPackageUri: !Not [!Equals [!Ref ProjectPackageS3Uri, ""]]
  HasHaPackageUri: !Not [!Equals [!Ref HaProjectPackageS3Uri, ""]]
  HasCustomLeaseTableName: !Not [!Equals [!Ref LeaseTableName, ""]]

Resources:
  MuxerLeaseTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !If [HasCustomLeaseTableName, !Ref LeaseTableName, !Ref AWS::NoValue]
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: cluster_id
          AttributeType: S
      KeySchema:
        - AttributeName: cluster_id
          KeyType: HASH
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-lease-table"
        - Key: muxingplus:role
          Value: muxer

  MuxerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Muxer public ingress/egress policy
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedIngressCidr
        - IpProtocol: udp
          FromPort: 500
          ToPort: 500
          CidrIp: !Ref AllowedIngressCidr
        - IpProtocol: udp
          FromPort: 4500
          ToPort: 4500
          CidrIp: !Ref AllowedIngressCidr
        - IpProtocol: "50"
          CidrIp: !Ref AllowedIngressCidr
        - !If
          - AllowGreIngressEnabled
          - IpProtocol: "47"
            CidrIp: !Ref GreIngressCidr
          - !Ref AWS::NoValue
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-muxer-sg"

  MuxerHaSyncSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Muxer HA sync interface SG
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-ha-sync-sg"

  MuxerHaSyncSecurityGroupIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref MuxerHaSyncSecurityGroup
      IpProtocol: -1
      SourceSecurityGroupId: !Ref MuxerHaSyncSecurityGroup

  MuxerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: !Sub "${ClusterName}-muxer-inline-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt MuxerLeaseTable.Arn
              - Effect: Allow
                Action:
                  - ec2:AssociateAddress
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: "*"

  MuxerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref MuxerRole

  MuxerNodeAPrimaryEni:
    Type: AWS::EC2::NetworkInterface
    Properties:
      Description: !Sub "${ClusterName}-muxer-a-primary"
      GroupSet:
        - !Ref MuxerSecurityGroup
      PrivateIpAddress: !If [HasNodeAPrivateIp, !Ref NodeAPrivateIp, !Ref AWS::NoValue]
      SourceDestCheck: false
      SubnetId: !Ref SubnetAId
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-muxer-a-primary"
        - Key: muxingplus:cluster
          Value: !Ref ClusterName
        - Key: muxingplus:component
          Value: muxer
        - Key: muxingplus:interface-role
          Value: primary
        - Key: muxingplus:node
          Value: a

  MuxerNodeAHaSyncEni:
    Type: AWS::EC2::NetworkInterface
    Properties:
      Description: !Sub "${ClusterName}-muxer-a-ha-sync"
      GroupSet:
        - !Ref MuxerHaSyncSecurityGroup
      PrivateIpAddress: !Ref NodeAHaSyncIp
      SourceDestCheck: false
      SubnetId: !Ref HaSyncSubnetAId
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-muxer-a-ha-sync"
        - Key: muxingplus:cluster
          Value: !Ref ClusterName
        - Key: muxingplus:component
          Value: muxer
        - Key: muxingplus:interface-role
          Value: ha-sync
        - Key: muxingplus:node
          Value: a

  MuxerNodeA:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref MuxerInstanceProfile
      NetworkInterfaces:
        - DeviceIndex: "0"
          NetworkInterfaceId: !Ref MuxerNodeAPrimaryEni
        - DeviceIndex: "1"
          NetworkInterfaceId: !Ref MuxerNodeAHaSyncEni
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeType: gp3
            VolumeSize: !Ref RootVolumeSizeGiB
            DeleteOnTermination: true
        - DeviceName: /dev/sdf
          Ebs:
            VolumeType: gp3
            VolumeSize: !Ref LoggingVolumeSizeGiB
            DeleteOnTermination: true
        - DeviceName: /dev/sdg
          Ebs:
            VolumeType: gp3
            VolumeSize: !Ref ApplicationVolumeSizeGiB
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-muxer-a"
        - Key: muxingplus:cluster
          Value: !Ref ClusterName
        - Key: muxingplus:component
          Value: muxer
        - Key: muxingplus:node
          Value: a
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail
          dnf install -y awscli unzip jq iptables iproute conntrack-tools

          LOG_DIR="${LoggingMountPath}"
          APP_DIR="${ApplicationMountPath}"

          mkdir -p "$LOG_DIR" "$APP_DIR" /etc/muxingplus-ha /opt

          ROOT_PART="$(findmnt -n -o SOURCE /)"
          ROOT_DISK="$(echo "$ROOT_PART" | sed -E 's/p?[0-9]+$//')"
          LOG_DEV="$(lsblk -dpno NAME,TYPE | awk -v root="$ROOT_DISK" '$2=="disk" && $1!=root {print $1}' | sort | sed -n '1p')"
          APP_DEV="$(lsblk -dpno NAME,TYPE | awk -v root="$ROOT_DISK" '$2=="disk" && $1!=root {print $1}' | sort | sed -n '2p')"
          if [[ -z "$LOG_DEV" || -z "$APP_DEV" ]]; then
            echo "Expected 2 extra data disks for LOG/Application"
            exit 1
          fi

          blkid "$LOG_DEV" >/dev/null 2>&1 || mkfs.xfs -f -L MUXER_LOG "$LOG_DEV"
          blkid "$APP_DEV" >/dev/null 2>&1 || mkfs.xfs -f -L MUXER_APP "$APP_DEV"

          LOG_UUID="$(blkid -s UUID -o value "$LOG_DEV")"
          APP_UUID="$(blkid -s UUID -o value "$APP_DEV")"

          grep -qE "[[:space:]]${LoggingMountPath}[[:space:]]" /etc/fstab || echo "UUID=$LOG_UUID ${LoggingMountPath} xfs defaults,nofail 0 2" >> /etc/fstab
          grep -qE "[[:space:]]${ApplicationMountPath}[[:space:]]" /etc/fstab || echo "UUID=$APP_UUID ${ApplicationMountPath} xfs defaults,nofail 0 2" >> /etc/fstab

          mount "$LOG_DIR" || true
          mount "$APP_DIR" || true
          mount -a

          mkdir -p "$APP_DIR/muxer" "$APP_DIR/muxingplus-ha"
          rm -rf /opt/muxer /opt/muxingplus-ha
          ln -s "$APP_DIR/muxer" /opt/muxer
          ln -s "$APP_DIR/muxingplus-ha" /opt/muxingplus-ha

          if [[ -n "${ProjectPackageS3Uri}" ]]; then
            aws s3 cp "${ProjectPackageS3Uri}" /tmp/muxer-package.zip
            unzip -oq /tmp/muxer-package.zip -d "$APP_DIR/muxer"
            if [[ ! -f "$APP_DIR/muxer/README.md" ]]; then
              inner_dir="$(find "$APP_DIR/muxer" -mindepth 1 -maxdepth 1 -type d | head -n1 || true)"
              if [[ -n "$inner_dir" && -f "$inner_dir/README.md" ]]; then
                cp -a "$inner_dir"/. "$APP_DIR/muxer/"
              fi
            fi
          fi

          HA_PACKAGE_URI="${HaProjectPackageS3Uri}"
          if [[ -z "$HA_PACKAGE_URI" ]]; then
            HA_PACKAGE_URI="${ProjectPackageS3Uri}"
          fi
          if [[ -n "$HA_PACKAGE_URI" ]]; then
            aws s3 cp "$HA_PACKAGE_URI" /tmp/muxingplus-ha.zip
            unzip -oq /tmp/muxingplus-ha.zip -d "$APP_DIR/muxingplus-ha"
            if [[ ! -f "$APP_DIR/muxingplus-ha/README.md" ]]; then
              inner_dir="$(find "$APP_DIR/muxingplus-ha" -mindepth 1 -maxdepth 1 -type d | head -n1 || true)"
              if [[ -n "$inner_dir" && -f "$inner_dir/README.md" ]]; then
                cp -a "$inner_dir"/. "$APP_DIR/muxingplus-ha/"
              fi
            fi
            if [[ -f "$APP_DIR/muxingplus-ha/ops/headend-ha-active-standby/scripts/install-local.sh" ]]; then
              bash "$APP_DIR/muxingplus-ha/ops/headend-ha-active-standby/scripts/install-local.sh" "$APP_DIR/muxingplus-ha"
            fi
          fi

          if [[ -f "$APP_DIR/muxer/${MuxerInstallScript}" ]]; then
            bash "$APP_DIR/muxer/${MuxerInstallScript}" "$APP_DIR/muxer" || true
          fi

          TOKEN="$(curl -sS -X PUT 'http://169.254.169.254/latest/api/token' -H 'X-aws-ec2-metadata-token-ttl-seconds: 21600')"
          imds() {
            curl -sS -H "X-aws-ec2-metadata-token: $TOKEN" "$1"
          }
          iface_name_for_mac() {
            local target
            target="$(echo "$1" | tr '[:upper:]' '[:lower:]')"
            for path in /sys/class/net/*/address; do
              local current
              current="$(cat "$path")"
              if [[ "$current" == "$target" ]]; then
                basename "$(dirname "$path")"
                return 0
              fi
            done
            return 1
          }
          eni_details() {
            local target_eni="$1"
            local base_url
            base_url='http://169.254.169.254/latest/meta-data/network/interfaces/macs/'
            for mac in $(imds http://169.254.169.254/latest/meta-data/network/interfaces/macs/); do
              local eni_id
              eni_id="$(imds "$base_url$mac"'interface-id')"
              if [[ "$eni_id" == "$target_eni" ]]; then
                local clean_mac iface_name local_ip
                clean_mac="$(echo "$mac" | sed 's:/$::')"
                iface_name="$(iface_name_for_mac "$clean_mac")"
                local_ip="$(imds "$base_url$mac"'local-ipv4s' | head -n1)"
                echo "$clean_mac $iface_name $local_ip"
                return 0
              fi
            done
            return 1
          }

          read -r _ PRIMARY_IF PRIMARY_IP <<<"$(eni_details '${MuxerNodeAPrimaryEni}')"
          read -r _ SYNC_IF SYNC_IP <<<"$(eni_details '${MuxerNodeAHaSyncEni}')"

          cat >/etc/muxingplus-ha/ha.env <<EOF
          HA_CLUSTER_ID=${ClusterName}
          HA_NODE_ID=muxer-a
          HA_REGION=${AWS::Region}
          HA_DDB_TABLE=${MuxerLeaseTable}
          HA_LEASE_TTL_SEC=15
          HA_LOOP_INTERVAL_SEC=3
          HA_EIP_ALLOC_ID=${EipAllocationId}
          HA_ENI_ID=${MuxerNodeAPrimaryEni}
          HA_IPSEC_SERVICE=${MuxerServiceName}
          FLOW_SYNC_MODE=${FlowSyncMode}
          SA_SYNC_MODE=${SaSyncMode}
          HA_CONNTRACKD_SERVICE=conntrackd
          HA_CONNTRACKD_COMMIT_ON_PROMOTE=true
          HA_CONNTRACKD_RESYNC_ON_DEMOTE=true
          HA_DEMOTE_STOP_IPSEC=false
          HA_PROMOTE_START_SERVICES=
          HA_DEMOTE_STOP_SERVICES=
          HA_STATE_DIR=/run/muxingplus-ha
          HA_LOG_FILE=$LOG_DIR/muxingplus-ha.log
          HA_PRIMARY_INTERFACE=$PRIMARY_IF
          HA_PRIMARY_LOCAL_IP=$PRIMARY_IP
          HA_SYNC_INTERFACE=$SYNC_IF
          HA_SYNC_LOCAL_IP=$SYNC_IP
          HA_SYNC_PEER_IP=${NodeBHaSyncIp}
          EOF
          chmod 600 /etc/muxingplus-ha/ha.env

          if [[ '${FlowSyncMode}' == 'conntrackd' && -f /etc/muxingplus-ha/examples/conntrackd.conf.ftfw.example ]]; then
            cp /etc/muxingplus-ha/examples/conntrackd.conf.ftfw.example /etc/conntrackd/conntrackd.conf
            sed -i "s#<SYNC_LOCAL_IP>#$SYNC_IP#g" /etc/conntrackd/conntrackd.conf
            sed -i "s#<SYNC_PEER_IP>#${NodeBHaSyncIp}#g" /etc/conntrackd/conntrackd.conf
            sed -i "s#<SYNC_INTERFACE>#$SYNC_IF#g" /etc/conntrackd/conntrackd.conf
            systemctl enable conntrackd || true
            systemctl start conntrackd || true
          fi

          if systemctl list-unit-files | grep -q "^${MuxerServiceName}.service"; then
            systemctl enable "${MuxerServiceName}.service" || true
          fi

          if systemctl list-unit-files | grep -q '^muxingplus-ha.service'; then
            systemctl enable --now muxingplus-ha.service || true
          elif systemctl list-unit-files | grep -q "^${MuxerServiceName}.service"; then
            systemctl enable --now "${MuxerServiceName}.service" || true
          fi
          if systemctl list-unit-files | grep -q '^rpdb-nat-t-listener.service'; then
            systemctl enable --now rpdb-nat-t-listener.service || true
          fi

  InitialEipAssociation:
    Type: AWS::EC2::EIPAssociation
    Condition: HasEip
    DependsOn:
      - MuxerNodeA
    Properties:
      AllocationId: !Ref EipAllocationId
      NetworkInterfaceId: !Ref MuxerNodeAPrimaryEni

  MuxerNodeBPrimaryEni:
    Type: AWS::EC2::NetworkInterface
    Properties:
      Description: !Sub "${ClusterName}-muxer-b-primary"
      GroupSet:
        - !Ref MuxerSecurityGroup
      PrivateIpAddress: !If [HasNodeBPrivateIp, !Ref NodeBPrivateIp, !Ref AWS::NoValue]
      SourceDestCheck: false
      SubnetId: !Ref SubnetBId
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-muxer-b-primary"
        - Key: muxingplus:cluster
          Value: !Ref ClusterName
        - Key: muxingplus:component
          Value: muxer
        - Key: muxingplus:interface-role
          Value: primary
        - Key: muxingplus:node
          Value: b

  MuxerNodeBHaSyncEni:
    Type: AWS::EC2::NetworkInterface
    Properties:
      Description: !Sub "${ClusterName}-muxer-b-ha-sync"
      GroupSet:
        - !Ref MuxerHaSyncSecurityGroup
      PrivateIpAddress: !Ref NodeBHaSyncIp
      SourceDestCheck: false
      SubnetId: !Ref HaSyncSubnetBId
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-muxer-b-ha-sync"
        - Key: muxingplus:cluster
          Value: !Ref ClusterName
        - Key: muxingplus:component
          Value: muxer
        - Key: muxingplus:interface-role
          Value: ha-sync
        - Key: muxingplus:node
          Value: b

  MuxerNodeB:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref MuxerInstanceProfile
      NetworkInterfaces:
        - DeviceIndex: "0"
          NetworkInterfaceId: !Ref MuxerNodeBPrimaryEni
        - DeviceIndex: "1"
          NetworkInterfaceId: !Ref MuxerNodeBHaSyncEni
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeType: gp3
            VolumeSize: !Ref RootVolumeSizeGiB
            DeleteOnTermination: true
        - DeviceName: /dev/sdf
          Ebs:
            VolumeType: gp3
            VolumeSize: !Ref LoggingVolumeSizeGiB
            DeleteOnTermination: true
        - DeviceName: /dev/sdg
          Ebs:
            VolumeType: gp3
            VolumeSize: !Ref ApplicationVolumeSizeGiB
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-muxer-b"
        - Key: muxingplus:cluster
          Value: !Ref ClusterName
        - Key: muxingplus:component
          Value: muxer
        - Key: muxingplus:node
          Value: b
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail
          dnf install -y awscli unzip jq iptables iproute conntrack-tools

          LOG_DIR="${LoggingMountPath}"
          APP_DIR="${ApplicationMountPath}"

          mkdir -p "$LOG_DIR" "$APP_DIR" /etc/muxingplus-ha /opt

          ROOT_PART="$(findmnt -n -o SOURCE /)"
          ROOT_DISK="$(echo "$ROOT_PART" | sed -E 's/p?[0-9]+$//')"
          LOG_DEV="$(lsblk -dpno NAME,TYPE | awk -v root="$ROOT_DISK" '$2=="disk" && $1!=root {print $1}' | sort | sed -n '1p')"
          APP_DEV="$(lsblk -dpno NAME,TYPE | awk -v root="$ROOT_DISK" '$2=="disk" && $1!=root {print $1}' | sort | sed -n '2p')"
          if [[ -z "$LOG_DEV" || -z "$APP_DEV" ]]; then
            echo "Expected 2 extra data disks for LOG/Application"
            exit 1
          fi

          blkid "$LOG_DEV" >/dev/null 2>&1 || mkfs.xfs -f -L MUXER_LOG "$LOG_DEV"
          blkid "$APP_DEV" >/dev/null 2>&1 || mkfs.xfs -f -L MUXER_APP "$APP_DEV"

          LOG_UUID="$(blkid -s UUID -o value "$LOG_DEV")"
          APP_UUID="$(blkid -s UUID -o value "$APP_DEV")"

          grep -qE "[[:space:]]${LoggingMountPath}[[:space:]]" /etc/fstab || echo "UUID=$LOG_UUID ${LoggingMountPath} xfs defaults,nofail 0 2" >> /etc/fstab
          grep -qE "[[:space:]]${ApplicationMountPath}[[:space:]]" /etc/fstab || echo "UUID=$APP_UUID ${ApplicationMountPath} xfs defaults,nofail 0 2" >> /etc/fstab

          mount "$LOG_DIR" || true
          mount "$APP_DIR" || true
          mount -a

          mkdir -p "$APP_DIR/muxer" "$APP_DIR/muxingplus-ha"
          rm -rf /opt/muxer /opt/muxingplus-ha
          ln -s "$APP_DIR/muxer" /opt/muxer
          ln -s "$APP_DIR/muxingplus-ha" /opt/muxingplus-ha

          if [[ -n "${ProjectPackageS3Uri}" ]]; then
            aws s3 cp "${ProjectPackageS3Uri}" /tmp/muxer-package.zip
            unzip -oq /tmp/muxer-package.zip -d "$APP_DIR/muxer"
            if [[ ! -f "$APP_DIR/muxer/README.md" ]]; then
              inner_dir="$(find "$APP_DIR/muxer" -mindepth 1 -maxdepth 1 -type d | head -n1 || true)"
              if [[ -n "$inner_dir" && -f "$inner_dir/README.md" ]]; then
                cp -a "$inner_dir"/. "$APP_DIR/muxer/"
              fi
            fi
          fi

          HA_PACKAGE_URI="${HaProjectPackageS3Uri}"
          if [[ -z "$HA_PACKAGE_URI" ]]; then
            HA_PACKAGE_URI="${ProjectPackageS3Uri}"
          fi
          if [[ -n "$HA_PACKAGE_URI" ]]; then
            aws s3 cp "$HA_PACKAGE_URI" /tmp/muxingplus-ha.zip
            unzip -oq /tmp/muxingplus-ha.zip -d "$APP_DIR/muxingplus-ha"
            if [[ ! -f "$APP_DIR/muxingplus-ha/README.md" ]]; then
              inner_dir="$(find "$APP_DIR/muxingplus-ha" -mindepth 1 -maxdepth 1 -type d | head -n1 || true)"
              if [[ -n "$inner_dir" && -f "$inner_dir/README.md" ]]; then
                cp -a "$inner_dir"/. "$APP_DIR/muxingplus-ha/"
              fi
            fi
            if [[ -f "$APP_DIR/muxingplus-ha/ops/headend-ha-active-standby/scripts/install-local.sh" ]]; then
              bash "$APP_DIR/muxingplus-ha/ops/headend-ha-active-standby/scripts/install-local.sh" "$APP_DIR/muxingplus-ha"
            fi
          fi

          if [[ -f "$APP_DIR/muxer/${MuxerInstallScript}" ]]; then
            bash "$APP_DIR/muxer/${MuxerInstallScript}" "$APP_DIR/muxer" || true
          fi

          TOKEN="$(curl -sS -X PUT 'http://169.254.169.254/latest/api/token' -H 'X-aws-ec2-metadata-token-ttl-seconds: 21600')"
          imds() {
            curl -sS -H "X-aws-ec2-metadata-token: $TOKEN" "$1"
          }
          iface_name_for_mac() {
            local target
            target="$(echo "$1" | tr '[:upper:]' '[:lower:]')"
            for path in /sys/class/net/*/address; do
              local current
              current="$(cat "$path")"
              if [[ "$current" == "$target" ]]; then
                basename "$(dirname "$path")"
                return 0
              fi
            done
            return 1
          }
          eni_details() {
            local target_eni="$1"
            local base_url
            base_url='http://169.254.169.254/latest/meta-data/network/interfaces/macs/'
            for mac in $(imds http://169.254.169.254/latest/meta-data/network/interfaces/macs/); do
              local eni_id
              eni_id="$(imds "$base_url$mac"'interface-id')"
              if [[ "$eni_id" == "$target_eni" ]]; then
                local clean_mac iface_name local_ip
                clean_mac="$(echo "$mac" | sed 's:/$::')"
                iface_name="$(iface_name_for_mac "$clean_mac")"
                local_ip="$(imds "$base_url$mac"'local-ipv4s' | head -n1)"
                echo "$clean_mac $iface_name $local_ip"
                return 0
              fi
            done
            return 1
          }

          read -r _ PRIMARY_IF PRIMARY_IP <<<"$(eni_details '${MuxerNodeBPrimaryEni}')"
          read -r _ SYNC_IF SYNC_IP <<<"$(eni_details '${MuxerNodeBHaSyncEni}')"

          cat >/etc/muxingplus-ha/ha.env <<EOF
          HA_CLUSTER_ID=${ClusterName}
          HA_NODE_ID=muxer-b
          HA_REGION=${AWS::Region}
          HA_DDB_TABLE=${MuxerLeaseTable}
          HA_LEASE_TTL_SEC=15
          HA_LOOP_INTERVAL_SEC=3
          HA_EIP_ALLOC_ID=${EipAllocationId}
          HA_ENI_ID=${MuxerNodeBPrimaryEni}
          HA_IPSEC_SERVICE=${MuxerServiceName}
          FLOW_SYNC_MODE=${FlowSyncMode}
          SA_SYNC_MODE=${SaSyncMode}
          HA_CONNTRACKD_SERVICE=conntrackd
          HA_CONNTRACKD_COMMIT_ON_PROMOTE=true
          HA_CONNTRACKD_RESYNC_ON_DEMOTE=true
          HA_DEMOTE_STOP_IPSEC=false
          HA_PROMOTE_START_SERVICES=
          HA_DEMOTE_STOP_SERVICES=
          HA_STATE_DIR=/run/muxingplus-ha
          HA_LOG_FILE=$LOG_DIR/muxingplus-ha.log
          HA_PRIMARY_INTERFACE=$PRIMARY_IF
          HA_PRIMARY_LOCAL_IP=$PRIMARY_IP
          HA_SYNC_INTERFACE=$SYNC_IF
          HA_SYNC_LOCAL_IP=$SYNC_IP
          HA_SYNC_PEER_IP=${NodeAHaSyncIp}
          EOF
          chmod 600 /etc/muxingplus-ha/ha.env

          if [[ '${FlowSyncMode}' == 'conntrackd' && -f /etc/muxingplus-ha/examples/conntrackd.conf.ftfw.example ]]; then
            cp /etc/muxingplus-ha/examples/conntrackd.conf.ftfw.example /etc/conntrackd/conntrackd.conf
            sed -i "s#<SYNC_LOCAL_IP>#$SYNC_IP#g" /etc/conntrackd/conntrackd.conf
            sed -i "s#<SYNC_PEER_IP>#${NodeAHaSyncIp}#g" /etc/conntrackd/conntrackd.conf
            sed -i "s#<SYNC_INTERFACE>#$SYNC_IF#g" /etc/conntrackd/conntrackd.conf
            systemctl enable conntrackd || true
            systemctl start conntrackd || true
          fi

          if systemctl list-unit-files | grep -q "^${MuxerServiceName}.service"; then
            systemctl enable "${MuxerServiceName}.service" || true
          fi

          if systemctl list-unit-files | grep -q '^muxingplus-ha.service'; then
            systemctl enable --now muxingplus-ha.service || true
          elif systemctl list-unit-files | grep -q "^${MuxerServiceName}.service"; then
            systemctl enable --now "${MuxerServiceName}.service" || true
          fi
          if systemctl list-unit-files | grep -q '^rpdb-nat-t-listener.service'; then
            systemctl enable --now rpdb-nat-t-listener.service || true
          fi

Outputs:
  ClusterName:
    Value: !Ref ClusterName
  MuxerNodeAInstanceId:
    Value: !Ref MuxerNodeA
  MuxerNodeBInstanceId:
    Value: !Ref MuxerNodeB
  MuxerNodeAPrimaryEniId:
    Value: !Ref MuxerNodeAPrimaryEni
  MuxerNodeBPrimaryEniId:
    Value: !Ref MuxerNodeBPrimaryEni
  MuxerNodeAHaSyncEniId:
    Value: !Ref MuxerNodeAHaSyncEni
  MuxerNodeBHaSyncEniId:
    Value: !Ref MuxerNodeBHaSyncEni
  SecurityGroupId:
    Value: !Ref MuxerSecurityGroup
  HaSyncSecurityGroupId:
    Value: !Ref MuxerHaSyncSecurityGroup
  LeaseTableName:
    Value: !Ref MuxerLeaseTable
  EipAllocationId:
    Condition: HasEip
    Value: !Ref EipAllocationId
