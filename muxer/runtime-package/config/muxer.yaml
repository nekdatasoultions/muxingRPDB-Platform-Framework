# Global MUXER settings
mode: pass_through
public_ip: 54.204.221.89
public_edge:
  mode: aws_eip_association
  strict_non_nat_supported: false

customer_sot:
  backend: dynamodb
  sync_from_variables_on_render: false
  dynamodb:
    region: us-east-1
    table_name: muxingplus-customer-sot

# Interfaces on the MUXER host
interfaces:
  public_if: ens34
  public_private_ip: 172.31.34.89   # active muxer public-side ENI private IP
  inside_if: ens35
  inside_ip: 172.31.69.213

# Controls how the muxer chooses the local GRE/IPIP underlay identity.
# - module_inside_ip: preserves the historical floating muxer underlay from customer modules
# - interface_ip: uses the active transport interface IP instead, which is safer for staging
transport_identity:
  local_underlay_mode: interface_ip

# Default backend underlay IP for customer transport tunnels.
# In MUXER3 this points to the per-customer termination endpoint.
backend_underlay_ip: 172.31.40.211

# Stable backend role map for customer transport delivery.
# Customer SoT should prefer backend_role, while runtime still derives a concrete
# backend_underlay_ip from the active role mapping at load/apply time.
backend_roles:
  nat-active:
    active_az: us-east-1a
    ip_by_az:
      us-east-1a:
        underlay_ip: 172.31.40.221
      us-east-1b:
        underlay_ip: 172.31.141.221
  nonnat-active:
    active_az: us-east-1a
    ip_by_az:
      us-east-1a:
        underlay_ip: 172.31.40.220
      us-east-1b:
        underlay_ip: 172.31.141.220

# Overlay pool used to allocate /30s for customer IPIP tunnel interfaces
overlay_pool: 169.254.0.0/18

# Global strongSwan rendering defaults (used in ipsec_termination mode)
ipsec:
  render_dir: /etc/muxer/config/rendered
  local_id: 54.204.221.89
  ike: aes256-sha256-modp2048!
  esp: aes256-sha256!
  dpddelay: 30s
  dpdtimeout: 120s
  dpdaction: restart
  forceencaps: false
  mobike: false
  fragmentation: true
  ikelifetime: 28800s
  lifetime: 28800s
  auto: route

# iptables policy
iptables:
  chains:
    mangle_chain: MUXER_MANGLE
    mangle_postrouting_chain: MUXER_MANGLE_POST
    filter_chain: MUXER_FILTER
    input_chain: MUXER_INPUT
    nat_prerouting_chain: MUXER_NAT_PRE
    nat_postrouting_chain: MUXER_NAT_POST
  default_drop_ipsec_to_public_ip: true   # drop non-allowed peers to public/private target on 500/4500/ESP
  use_nat_rewrite: true                   # enable DNAT/SNAT rewrite in pass-through (required for identity masking)

# Experimental payload bridge for forced 4500->500 customers.
experimental:
  nfqueue_ike_bridge:
    enabled: false
    queue_in: 2101
    queue_out: 2102
    queue_bypass: true
    drop_nat_keepalive: true
    flow_ttl_sec: 300
    log_interval_sec: 30
  natd_dpi_rewrite:
    enabled: false
    queue_in: 2111
    queue_out: 2112
    queue_bypass: true
    log_interval_sec: 30
  trace:
    enabled: true
    log_dir: /var/log/muxer-trace
    snapshot_interval_sec: 15
    pcap_file_mb: 50
    pcap_ring_files: 16
    bridge_log_lines: 8

# Base numbers for deterministic allocation (used in pass_through mode)
allocation:
  base_table: 2000
  base_mark: 0x2000


