schema_version: 1

environment:
  name: example-rpdb-staged-live
  description: Repo-only staged environment used to verify the approved customer deploy path without touching AWS or live nodes.
  aws:
    region: us-east-1
    account_hint: rpdb-staged-live
  access:
    method: staged
  live_apply:
    enabled: true
    requires_approval: true

targets:
  muxer:
    name: rpdb-staged-muxer-active
    role: muxer
    rpdb_managed: true
    selector:
      type: staged
      value: build/staged-live/muxer-root
      private_ip: 172.31.127.237
    access:
      method: staged
  headends:
    nat:
      active:
        name: rpdb-staged-nat-headend-active-a
        role: nat-headend
        rpdb_managed: true
        selector:
          type: staged
          value: build/staged-live/nat-active-root
          private_ip: 172.31.40.222
        access:
          method: staged
      standby:
        name: rpdb-staged-nat-headend-standby-b
        role: nat-headend
        rpdb_managed: true
        selector:
          type: staged
          value: build/staged-live/nat-standby-root
          private_ip: 172.31.141.222
        access:
          method: staged
    non_nat:
      active:
        name: rpdb-staged-nonnat-headend-active-a
        role: non-nat-headend
        rpdb_managed: true
        selector:
          type: staged
          value: build/staged-live/nonnat-active-root
          private_ip: 172.31.40.223
        access:
          method: staged
      standby:
        name: rpdb-staged-nonnat-headend-standby-b
        role: non-nat-headend
        rpdb_managed: true
        selector:
          type: staged
          value: build/staged-live/nonnat-standby-root
          private_ip: 172.31.141.223
        access:
          method: staged
  cgnat:
    headend:
      active:
        name: rpdb-staged-cgnat-headend-active-a
        role: cgnat-headend
        rpdb_managed: true
        selector:
          type: staged
          value: build/staged-live/cgnat-headend-root
          private_ip: 172.31.38.227
        access:
          method: staged
    isp_gateways:
      isp-cgnat-router-1:
        name: rpdb-staged-cgnat-isp-gateway-1
        role: cgnat-isp-gateway
        rpdb_managed: true
        selector:
          type: staged
          value: build/staged-live/cgnat-isp-gateway-1-root
          private_ip: 172.31.36.155
        access:
          method: staged
      isp-cgnat-router-2:
        name: rpdb-staged-cgnat-isp-gateway-2
        role: cgnat-isp-gateway
        rpdb_managed: true
        selector:
          type: staged
          value: build/staged-live/cgnat-isp-gateway-2-root
          private_ip: 172.31.36.156
        access:
          method: staged
  smartconnect:
    gateway:
      name: rpdb-staged-smartconnect-gateway
      role: smartconnect-gateway
      rpdb_managed: true
      selector:
        type: staged
        value: build/staged-live/smartconnect-root
        private_ip: 172.31.36.200
      access:
        method: staged

datastores:
  mode: staged
  customer_sot_table: staged-customer-sot
  allocation_table: staged-customer-sot-allocations
  staged_root: build/staged-live/datastores

artifacts:
  mode: staged
  bucket: staged-local
  prefix: staged/customer-deploy
  staged_root: build/staged-live/artifacts

backups:
  baseline_root: build/staged-live/backups/baseline
  muxer: build/staged-live/backups/baseline/muxer
  nat_headend: build/staged-live/backups/baseline/nat-headend
  non_nat_headend: build/staged-live/backups/baseline/non-nat-headend
  cgnat_headend: build/staged-live/backups/baseline/cgnat-headend
  smartconnect_gateway: build/staged-live/backups/baseline/smartconnect-gateway
  cgnat_isp_gateways:
    isp-cgnat-router-1: build/staged-live/backups/baseline/cgnat-isp-gateways/isp-cgnat-router-1
    isp-cgnat-router-2: build/staged-live/backups/baseline/cgnat-isp-gateways/isp-cgnat-router-2

nat_t_watcher:
  log_source:
    type: file
    path: build/staged-live/logs/muxer-events.jsonl
  state_root: build/staged-live/nat-t-watcher/state
  output_root: build/staged-live/nat-t-watcher/out
  package_root: build/staged-live/nat-t-watcher/packages
  automation:
    enabled: true
    requires_approval: true
    run_provisioning: true
    follow: false
    poll_interval_seconds: 5
  promotion:
    mode: deploy_only
    skip_if_already_nat: true
    allow_direct_nat_apply_if_missing: true
  log_sync:
    mode: local_file
    local_copy: build/staged-live/nat-t-watcher/synced/muxer-events.jsonl

dynamic_peer_ip_watcher:
  source:
    type: json_file
    path: build/staged-live/dynamic-peer-ip-watcher/device-registry.json
    serial_number_attribute: serialNumber
    current_ip_attribute: currentIP
    last_updated_attribute: lastUpdated
  state_root: build/staged-live/dynamic-peer-ip-watcher/state
  output_root: build/staged-live/dynamic-peer-ip-watcher/out
  package_root: build/staged-live/dynamic-peer-ip-watcher/packages
  automation:
    enabled: false
    requires_approval: true
    run_provisioning: true
    follow: true
    poll_interval_seconds: 30

secrets:
  allow_local_psk: false

customer_requests:
  allowed_roots:
    - muxer/config/customer-requests/migrated
    - muxer/config/customer-requests/examples

owners:
  validation: rpdb-validation-owner
  rollback: rpdb-rollback-owner
