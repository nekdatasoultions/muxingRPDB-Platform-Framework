schema_version: 1

defaults:
  transport:
    tunnel_type: gre
    tunnel_ttl: 64

  rpdb:
    priority_base: 1000

  protocols:
    udp500: true
    udp4500: true
    esp50: true
    force_rewrite_4500_to_500: false

  natd_rewrite:
    enabled: false
    initiator_inner_ip: ""

  ipsec:
    auto: trap|start
    dpddelay: 10s
    dpdtimeout: 120s
    dpdaction: restart
    initiation:
      mode: bidirectional
      headend_can_initiate: true
      customer_can_initiate: true
      traffic_can_start_tunnel: true
      bring_up_on_apply: true
      swanctl_start_action: trap|start

  post_ipsec_nat:
    enabled: false
    mode: disabled

  outside_nat:
    enabled: false
    mode: disabled
