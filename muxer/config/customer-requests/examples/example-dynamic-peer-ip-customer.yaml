schema_version: 1

customer:
  name: example-dynamic-peer-ip-customer
  customer_class: strict-non-nat
  peer:
    public_ip: 203.0.113.77
    remote_id: 203.0.113.77
    psk_secret_ref: /muxingrpdb/customers/example-dynamic-peer-ip-customer/psk
  selectors:
    local_subnets:
      - 172.31.54.39/32
      - 194.138.36.80/28
    remote_subnets:
      - 10.129.77.12/32
  backend:
    cluster: non-nat
  protocols:
    udp500: true
    udp4500: false
    esp50: true
  natd_rewrite:
    enabled: true
  dynamic_peer_ip:
    enabled: true
    source: device_registry_ddns
    device_registry:
      serial_number: example-router-77
      password_secret_ref: /muxingrpdb/customers/example-dynamic-peer-ip-customer/dynamic-peer-ip-password
    reapply:
      mode: deploy_only
      update_remote_id_when_equal_to_peer_ip: true
