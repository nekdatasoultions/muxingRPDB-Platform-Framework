schema_version: 1

customer:
  name: example-minimal-cgnat-shared-isp-local-pki
  customer_class: strict-non-nat
  peer:
    public_ip: 203.0.113.62
    psk_secret_ref: /muxingrpdb/customers/example-minimal-cgnat-shared-isp-local-pki/psk
  selectors:
    local_subnets:
      - 23.20.31.151/32
      - 194.138.36.86/32
    remote_subnets:
      - 10.20.30.12/32
  backend:
