          identity_ref: cgnat-head-end/example-minimal-cgnat-shared-isp-local-pki
          auth_ref: pki/cgnat/headend/example-minimal-cgnat-shared-isp-local-pki
        gateway:
          identity_ref: isp-cgnat-router-1/example-minimal-cgnat-shared-isp-local-pki
          auth_ref: pki/cgnat/gateway/isp-cgnat-router-1/example-minimal-cgnat-shared-isp-local-pki
          package_name: example-minimal-cgnat-shared-isp-local-pki-isp-cgnat-router-1
        trust:
          ca_ref: pki/cgnat/ca/example-minimal-cgnat-shared-isp-local-pki
